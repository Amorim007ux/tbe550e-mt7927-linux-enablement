name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax check
        run: |
          set -euo pipefail
          for f in scripts/*.sh scripts/github/*.sh; do
            bash -n "$f"
          done

      - name: Mocked quick installer tests
        run: |
          set -euo pipefail
          chmod +x scripts/test_quick_install_mock.sh
          ./scripts/test_quick_install_mock.sh

      - name: Python syntax check
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/extract_mt7927_firmware.py

      - name: Ensure docs exist
        run: |
          test -f README.md
          test -f docs/RUNBOOK.md
          test -f docs/BOOT_SEQUENCE.md
          test -f docs/FINAL_VALIDATION.md
